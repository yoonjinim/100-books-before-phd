function runImport() {
  const KEY = 'booksv3';
  let existing = [];
  try { existing = JSON.parse(localStorage.getItem(KEY)) || []; } catch {}

  const existingIds = new Set(existing.map(b => b.id));
  let added = 0, skipped = 0;

  NEW_BOOKS.forEach(b => {
    if (existingIds.has(b.id)) { skipped++; return; }
    existing.push(b);
    added++;
  });

  // sort by createdAt to keep stable order
  existing.sort((a, b) => (a.createdAt||0) - (b.createdAt||0));

  localStorage.setItem(KEY, JSON.stringify(existing));

  document.getElementById('log').textContent =
    `완료!\n추가됨: ${added}권\n건너뜀(중복): ${skipped}권\n현재 전체: ${existing.length}권\n\n이제 독서 기록 앱 페이지로 돌아가서 새로고침하세요.`;
}
